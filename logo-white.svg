<svg viewBox="195 90 290 250" xmlns="http://www.w3.org/2000/svg">

<g transform="translate(340, 155)">

  <!-- Outer hexagon outline (subtle) -->
  <path d="M-8,-54 L-38,-20 L-28,30 L12,54 L42,20 L32,-26 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Inner hexagon outline -->
  <path d="M0,-50 L-44,-18 L-28,38 L16,56 L48,12 L26,-34 Z" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Corner dots -->
  <circle cx="-44" cy="-18" r="4.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="48"  cy="12"  r="4.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="0"   cy="-50" r="4.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="16"  cy="56"  r="3.5" fill="rgba(255,255,255,0.75)"/>
  <circle cx="-28" cy="38"  r="3.5" fill="rgba(255,255,255,0.75)"/>
  <circle cx="26"  cy="-34" r="3.5" fill="rgba(255,255,255,0.75)"/>

  <!-- Cross lines -->
  <line x1="-44" y1="-18" x2="48"  y2="12"  stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
  <line x1="0"   y1="-50" x2="16"  y2="56"  stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
  <line x1="26"  y1="-34" x2="-28" y2="38"  stroke="rgba(255,255,255,0.45)" stroke-width="1"/>

  <!-- Subtle secondary lines -->
  <line x1="-44" y1="-18" x2="-28" y2="38"  stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="48"  y1="12"  x2="26"  y2="-34" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
  <line x1="0"   y1="-50" x2="48"  y2="12"  stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

  <!-- Center dot with spokes -->
  <circle cx="2" cy="2" r="6" fill="white"/>
  <line x1="2" y1="2" x2="-44" y2="-18" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
  <line x1="2" y1="2" x2="48"  y2="12"  stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
  <line x1="2" y1="2" x2="0"   y2="-50" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
  <line x1="2" y1="2" x2="16"  y2="56"  stroke="rgba(255,255,255,0.65)" stroke-width="1.2"/>
  <line x1="2" y1="2" x2="26"  y2="-34" stroke="rgba(255,255,255,0.65)" stroke-width="1.2"/>
  <line x1="2" y1="2" x2="-28" y2="38"  stroke="rgba(255,255,255,0.65)" stroke-width="1.2"/>

</g>

<!-- KRIEGERSTEIN -->
<text x="340" y="290" text-anchor="middle"
  font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
  font-size="28" font-weight="700" letter-spacing="6"
  fill="white">KRIEGERSTEIN</text>

<!-- Divider line -->
<line x1="270" y1="304" x2="410" y2="304" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>

<!-- CONSULTING -->
<text x="340" y="322" text-anchor="middle"
  font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
  font-size="11" font-weight="400" letter-spacing="5.5"
  fill="rgba(255,255,255,0.75)">CONSULTING</text>

</svg>
